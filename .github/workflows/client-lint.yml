name: Web CI

on:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: client-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-client:
    name: Lint Client (Accessibility Enforced)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix client --legacy-peer-deps

      - name: Run client lint
        run: npm --prefix client run lint

  build-client:
    name: Build Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix client --legacy-peer-deps

      - name: Run client build
        run: npm --prefix client run build

  backend-smoke:
    name: Backend Smoke Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Build client assets for server static hosting
        run: |
          npm ci --prefix client --legacy-peer-deps
          npm --prefix client run build

      - name: Start server
        env:
          NODE_ENV: production
          PORT: 4000
          ALLOWED_ORIGINS: http://localhost:4000
          TRUST_PROXY: 1
        run: npm --prefix server run start &

      - name: Wait for health endpoint
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:4000/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become healthy in time"
          exit 1

      - name: Validate readiness endpoint
        run: curl -fsS http://127.0.0.1:4000/api/ready
